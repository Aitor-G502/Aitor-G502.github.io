<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cookie Clicker RÁPIDO CON PRESTIGIO Y SKILLS</title>
<style>
body {font-family: Arial;background: linear-gradient(135deg,#f4e1c1,#e6c28b);text-align:center;overflow:hidden;}
.container {display:flex;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap;}
.panel {background:white;padding:15px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);width:260px;transition:transform 0.2s;}
.panel:hover {transform:scale(1.05);} 
#cookie {width:150px;cursor:pointer;}
button {width:100%;margin:5px 0;padding:8px;border:none;border-radius:10px;background:#ffb347;cursor:pointer;transition:all 0.2s;}
button:hover:not(.locked){background:#ffa500;transform:scale(1.05);} 
button.locked {background:#ccc;cursor:not-allowed;opacity:0.6;}
.floating {position:absolute;font-weight:bold;animation:floatUp 1s ease-out forwards;}
@keyframes floatUp {0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-60px);}}
.particle {position:absolute;width:6px;height:6px;border-radius:50%;background:orange;animation:explode 0.8s forwards;}
@keyframes explode {to{transform:translate(var(--x),var(--y));opacity:0;}}
.skill-node {padding:8px;border-radius:8px;margin:5px 0;transition:all 0.3s;}
.skill-node.locked {background:#ccc;color:#666;opacity:0.6;cursor:not-allowed;}
.skill-node.unlocked {background:#ffb347;color:#000;cursor:pointer;transform:scale(1.05);}
#prestigeEffect {position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:50px;color:#ffdf00;font-weight:bold;opacity:0;transition:opacity 0.5s, transform 0.5s;pointer-events:none;}
#prestigeIndicator {position:fixed;top:10%;left:50%;transform:translateX(-50%);font-size:30px;color:#ff0000;font-weight:bold;opacity:0;transition:opacity 0.5s, transform 0.5s;}
</style>
</head>
<body>

<h1>🍪 Cookie Clicker RÁPIDO</h1>
<h2 id="count">0</h2>
<h3>Prestigio: <span id="prestige">0</span> | SP: <span id="sp">0</span></h3>
<h3>Click: <span id="perClick">1</span> | Auto: <span id="perSecond">0</span></h3>
<div id="prestigeIndicator">💫 ¡Puedes hacer Prestigio por 5000 galletas! 💫</div>

<img id="cookie" src="sticker-removebg-preview.png">
<div id="prestigeEffect">✨ PRESTIGIO ✨</div>

<div class="container">
<div class="panel">
<h3>Edificios</h3>
<button id="buyClick">+Click (<span id="clickCost">10</span>) x<span id="clickLevel">1</span></button>
<button id="buyAuto">Auto (<span id="autoCost">50</span>) x<span id="autoLevel">0</span></button>
<button id="buyFarm">🌾 Granja (<span id="farmCost">200</span>) x<span id="farmLevel">0</span></button>
<button id="buyFactory">🏭 Fábrica (<span id="factoryCost">1000</span>) x<span id="factoryLevel">0</span></button>
</div>

<div class="panel">
<h3>Skills</h3>
<div id="skillClick" class="skill-node locked">+50% Click (1 SP)</div>
<div id="skillAuto" class="skill-node locked">+50% Auto (1 SP)</div>
<div id="skillMega" class="skill-node locked">x2 Todo (2 SP)</div>
</div>

<div class="panel">
<h3>Prestigio</h3>
<button id="prestigeButton" onclick="prestigeReset()">Reiniciar</button>
</div>
</div>

<script>
let cookies=0, perClick=1, perSecond=0;
let prestige=0, skillPoints=0;
let clickMulti=1, autoMulti=1;
let skills={clickBoost:false,autoBoost:false,megaBoost:false};
let clickLevel=1, autoLevel=0, farmLevel=0, factoryLevel=0;
let clickCost=10, autoCost=50, farmCost=200, factoryCost=1000;
const el=id=>document.getElementById(id);
const prestigeEffect = el('prestigeEffect');
const prestigeIndicator = el('prestigeIndicator');
const prestigeButton = el('prestigeButton');
const skillRequirements = {clickBoost: {prestige:0, cost:1}, autoBoost: {prestige:0, autoLevel:5, cost:1}, megaBoost: {prestige:1, cost:2}};
const prestigeCost = 5000;

let clicking=false;
el("cookie").addEventListener('mousedown',()=>{clicking=true; clickLoop();});
el("cookie").addEventListener('mouseup',()=>{clicking=false;});
function clickLoop(){if(clicking){cookies+=perClick*clickMulti*(1+prestige*0.1); spawnText(Math.random()*window.innerWidth, Math.random()*window.innerHeight, '+'+Math.floor(perClick*clickMulti*(1+prestige*0.1))); spawnParticles(Math.random()*window.innerWidth, Math.random()*window.innerHeight ); update(); setTimeout(clickLoop, 50);}}

function spawnText(x,y,text){let d=document.createElement("div"); d.className="floating"; d.style.left=x+"px"; d.style.top=y+"px"; d.textContent=text; document.body.appendChild(d); setTimeout(()=>d.remove(),1000);}
function spawnParticles(x,y){for(let i=0;i<6;i++){let p=document.createElement("div"); p.className="particle"; p.style.left=x+"px"; p.style.top=y+"px"; p.style.setProperty('--x',(Math.random()*100-50)+'px'); p.style.setProperty('--y',(Math.random()*100-50)+'px'); document.body.appendChild(p); setTimeout(()=>p.remove(),800);}}

function buy(type){if(type==='click' && cookies>=clickCost){cookies-=clickCost; perClick+=1; clickLevel++; clickCost=Math.floor(10*Math.pow(1.15,clickLevel-1));}
if(type==='auto' && cookies>=autoCost){cookies-=autoCost; perSecond+=1; autoLevel++; autoCost=Math.floor(50*Math.pow(1.15,autoLevel));}
if(type==='farm' && cookies>=farmCost){cookies-=farmCost; perSecond+=5; farmLevel++; farmCost=Math.floor(200*Math.pow(1.15,farmLevel));}
if(type==='factory' && cookies>=factoryCost){cookies-=factoryCost; perSecond+=20; factoryLevel++; factoryCost=Math.floor(1000*Math.pow(1.15,factoryLevel));}update();}
el("buyClick").onclick=()=>buy('click'); el("buyAuto").onclick=()=>buy('auto'); el("buyFarm").onclick=()=>buy('farm'); el("buyFactory").onclick=()=>buy('factory');

function checkSkillVisual(skill){let node = el('skill'+skill.charAt(0).toUpperCase()+skill.slice(1)); let req = skillRequirements[skill]; if(prestige >= (req.prestige||0) && (autoLevel >= (req.autoLevel||0)) && skillPoints >= req.cost){node.classList.remove('locked'); node.classList.add('unlocked');} else {if(!skills[skill]) { node.classList.add('locked'); node.classList.remove('unlocked'); }}}
function unlockSkill(skill){let node=el('skill'+skill.charAt(0).toUpperCase()+skill.slice(1)); if(node.classList.contains('locked')) return; skillPoints-=skillRequirements[skill].cost; skills[skill]=true; node.classList.add('unlocked'); node.style.background='#ffd700'; applySkills(); update();}
el('skillClick').onclick=()=>unlockSkill('clickBoost');
el('skillAuto').onclick=()=>unlockSkill('autoBoost');
el('skillMega').onclick=()=>unlockSkill('megaBoost');

function prestigeReset(){if(cookies>=prestigeCost){prestige++; skillPoints++; cookies=0; perClick=1; perSecond=0; clickLevel=1; autoLevel=0; farmLevel=0; factoryLevel=0; clickCost=10; autoCost=50; farmCost=200; factoryCost=1000; clickMulti=1; autoMulti=1; showPrestigeEffect();}}
function showPrestigeEffect(){prestigeEffect.style.opacity=1; prestigeEffect.style.transform='translate(-50%,-50%) scale(1.3)'; setTimeout(()=>{prestigeEffect.style.transform='translate(-50%,-50%) scale(1)';},300); setTimeout(()=>{prestigeEffect.style.opacity=0;},1200);}

setInterval(()=>{
cookies+=perSecond*autoMulti*(1+prestige*0.1);
update();
checkSkillVisual('clickBoost'); checkSkillVisual('autoBoost'); checkSkillVisual('megaBoost');
if(cookies>=prestigeCost){prestigeIndicator.style.opacity=1; prestigeIndicator.style.transform='translateX(-50%) scale(1.2)'; prestigeIndicator.textContent = '💫 ¡Puedes hacer Prestigio por '+prestigeCost+' galletas! 💫';} else {prestigeIndicator.style.opacity=0; prestigeIndicator.style.transform='translateX(-50%) scale(1)';}
},50);

function applySkills(){clickMulti=1; autoMulti=1; if(skills.clickBoost) clickMulti*=1.5; if(skills.autoBoost) autoMulti*=1.5; if(skills.megaBoost){clickMulti*=2; autoMulti*=2;}}
function update(){el("count").textContent=Math.floor(cookies); el("perClick").textContent=Math.floor(perClick*clickMulti*(1+prestige*0.1)); el("perSecond").textContent=Math.floor(perSecond*autoMulti*(1+prestige*0.1)); el("prestige").textContent=prestige; el("sp").textContent=skillPoints; el("clickCost").textContent=clickCost; el("autoCost").textContent=autoCost; el("farmCost").textContent=farmCost; el("factoryCost").textContent=factoryCost; el("clickLevel").textContent=clickLevel; el("autoLevel").textContent=autoLevel; el("farmLevel").textContent=farmLevel; el("factoryLevel").textContent=factoryLevel;}
update();
</script>

</body>
</html>
