<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot</title>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f5f5;
  text-align: center;
}
h1 { margin-bottom: 10px; }

#tokenTimer {
  font-weight: bold;
  margin-bottom: 20px;
}

#buttonsContainer {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  max-width: 600px;
  margin: 0 auto 20px auto;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #d3aaff;
  color: white;
  cursor: pointer;
}
button:hover { background: #A8C5DC; }

pre {
  background: white;
  padding: 15px;
  border-radius: 10px;
  max-height: 300px;
  overflow: auto;
  text-align: left;
  max-width: 600px;
  margin: 0 auto;
}

img { margin-top: 20px; max-width: 200px; }
</style>
</head>
<body>

<h1>Robot</h1>

<div id="tokenTimer">Obteniendo token...</div>

<div id="buttonsContainer">
  <!-- Botones generados automáticamente -->
</div>

<pre id="output">Aquí aparecerá la respuesta...</pre>

<img src="sticker-removebg-preview.png" alt="sticker">

<script>
let token = ''; // Token global
let tokenExpiry = 0; // Timestamp de expiración
let countdownInterval = null;

const URL_ENDPOINT = 'https://es.robotkeenon.com/api/open/scene/v1/robot/call/task';
const STORE_ID = 'C00001185';

// Elementos HTML
const buttonsContainer = document.getElementById('buttonsContainer');
const output = document.getElementById('output');
const tokenTimer = document.getElementById('tokenTimer');

// Cargar endpoints desde la base de datos
async function loadEndpoints() {
    try {
        const res = await fetch('get_endpoints.php');
        const data = await res.json();

        buttonsContainer.innerHTML = '';

        data.forEach((ep) => {
            const btn = document.createElement('button');
            btn.textContent = ep.name;
            btn.addEventListener('click', () => fetchData(ep));
            buttonsContainer.appendChild(btn);
        });

    } catch (err) {
        output.textContent = 'Error cargando botones: ' + err.message;
    }
}

// Función para actualizar token según expires_in del servidor
async function updateToken() {
    tokenTimer.textContent = 'Obteniendo token...';

    try {
        const res = await fetch('https://es.robotkeenon.com/api/open/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                client_id: 'MFPPuu0GtJUIDpwX',
                client_secret: 'XRxN2SV2RPJfWW3n',
                grant_type: 'client_credentials'
            })
        });

        if (!res.ok) throw new Error('HTTP error ' + res.status);

        const data = await res.json();
        token = data.access_token;
        tokenExpiry = Date.now() + data.expires_in * 1000;

        console.log('Token actualizado:', token);

        startTokenCountdown();

        // Programar próxima actualización 5s antes de expirar
        const refreshTime = data.expires_in * 1000 - 5000;
        setTimeout(updateToken, refreshTime);

    } catch (err) {
        tokenTimer.textContent = 'Error al obtener token, reintentando...';
        console.error(err);
        setTimeout(updateToken, 10000); // reintentar en 10s si falla
    }
}

// Contador visual del token
function startTokenCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
        const remaining = Math.max(0, tokenExpiry - Date.now());
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        tokenTimer.textContent = `Token válido. Próxima actualización en ${minutes}m ${seconds}s`;

        if (remaining <= 0) clearInterval(countdownInterval);
    }, 1000);
}

// Función para usar el endpoint
async function fetchData(ep) {
    if (!token) {
        output.textContent = 'Esperando token...';
        return;
    }

    const headers = { 'Authorization': 'Bearer ' + token };
    const formData = new FormData();
    formData.append('uuid', ep.uuid);
    formData.append('pointId', ep.pointId);
    formData.append('storeId', STORE_ID);

    output.textContent = 'Cargando ' + ep.name + '...';

    try {
        const res = await fetch(URL_ENDPOINT, {
            method: 'POST',
            headers: headers,
            body: formData
        });

        if (!res.ok) throw new Error('HTTP error ' + res.status);
        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
    } catch (err) {
        output.textContent = 'Error en ' + ep.name + ': ' + err.message;
    }
}

// Iniciar token y cargar endpoints al cargar la página
updateToken();
loadEndpoints();
</script>

</body>
</html>
